{% extends 'base.html' %}

{% block content %}
<h2>Iniciar Sesión</h2>

{% if form.errors %}
    <p style="color: red;">Tu nombre de usuario o contraseña no son correctos.</p>
{% endif %}

<form method="post">
    {% csrf_token %}
    
    {{ form.as_p }}
    
    <button type="submit">Entrar</button>
</form>
{% endblock %}
